name: PHOBOS-ML CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install clang-format
        run: sudo apt-get install -y clang-format-18

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build project
        run: make

      - name: Move .clang-format to workspace root
        run: cp PHOBOS-ML/.clang-format .

      - name: Check formatting
        run: clang-format-18 -style=file --dry-run --Werror PHOBOS-ML/src/*.c PHOBOS-ML/include/*.h PHOBOS-ML/tests/*.c
      
      - name: Check header compiles standalone
        run: |
          echo "#include \"tensor.h\"" > src/test_header.c
          gcc -c src/test_header.c -Iinclude
      
      - name: Build tests
        run: make build/test_tensor

      - name: Run tests
        run: ./build/test_tensor

      - name: Debug clang-format
        run: |
          pwd
          ls -a
          ls -a ..


