name: PHOBOS-ML CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Debug repo layout
        run: |
          pwd
          ls -la
          find . -name ".clang-format"

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Install build tools
        run: sudo apt-get install -y build-essential

      - name: Check formatting
        run: |
          clang-format-18 -style=file:.clang-format --dry-run --Werror \
            src/*.c include/*.h tests/*.c

      - name: Build project
        run: make

      - name: Check header compiles standalone
        run: |
          echo '#include "tensor.h"' > src/test_header.c
          gcc -c src/test_header.c -Iinclude

      - name: Build tests
        run: make build/test_tensor

      - name: Run tests
        run: ./build/test_tensor
        